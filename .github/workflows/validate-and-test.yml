name: Validate and test

on:
  pull_request:
  push:
    branches: [ main ]
    tags-ignore: [ v* ]

concurrency:
  # Only run once for latest commit per ref and cancel other (previous) runs.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formatting-check:
    name: Checks
    runs-on: ubuntu-latest
    if: github.repository == 'apache/pekko-http'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Scala on JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17

      - name: Install sbt
        uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2

      - name: Cache Coursier cache
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - name: Cache Build Target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: project/**/target
          key: build-target-${{ hashFiles('**/*.sbt', 'project/build.properties', 'project/**/*.scala') }}

      - name: Check code is formatted
        run: sbt checkCodeStyle

      - name: Check for missing formatting
        run: git diff --exit-code --color

      #- name: FOSSA policy check
      #  if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == 'apache/pekko-http' }}
      #  run: |-
      #    curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/spectrometer/master/install.sh | bash
      #    fossa analyze && fossa test
      #  env:
      #    FOSSA_API_KEY: "${{secrets.FOSSA_API_KEY}}"

  compile-and-test:
    name: Compile and test
    runs-on: ubuntu-latest
    if: github.repository == 'apache/pekko-http'
    strategy:
      fail-fast: false
      matrix:
        SCALA_VERSION: [scala213, scala3, next]
        JDK: [17]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK ${{ matrix.JDK }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: ${{ matrix.JDK }}

      - name: Install sbt
        uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2

      - name: Cache Coursier cache
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - name: Cache Build Target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: project/**/target
          key: build-target-${{ hashFiles('**/*.sbt', 'project/build.properties', 'project/**/*.scala') }}

      - name: Enable jvm-opts
        run: cp .jvmopts-ci .jvmopts

      - name: Compile everything
        run: |-
          scala_version="$(bash .github/scripts/resolve-scala-version.sh "${{ matrix.SCALA_VERSION }}")"
          sbt "++${scala_version}!" Test/compile

      # Quick testing for PR validation
      - name: Validate pull request for JDK ${{ matrix.JDK }}, Scala ${{ matrix.SCALA_VERSION }}
        if: ${{ github.event_name == 'pull_request' }}
        run: |-
          scala_version="$(bash .github/scripts/resolve-scala-version.sh "${{ matrix.SCALA_VERSION }}")"
          sbt -Dpekko.http.parallelExecution=false -Dpekko.test.timefactor=2 "++${scala_version}!" validatePullRequest

      # Full testing for pushes
      - name: Run all tests JDK ${{ matrix.JDK }}, Scala ${{ matrix.SCALA_VERSION }}
        if: ${{ github.event_name == 'push' }}
        run: |-
          scala_version="$(bash .github/scripts/resolve-scala-version.sh "${{ matrix.SCALA_VERSION }}")"
          if [ "${{ matrix.SCALA_VERSION }}" = "next" ]; then
            sbt -Dpekko.http.parallelExecution=false -Dpekko.test.timefactor=2 "++${scala_version}!" test
          else
            sbt -Dpekko.http.parallelExecution=false -Dpekko.test.timefactor=2 "++${scala_version}!" mimaReportBinaryIssues test
          fi

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: success() || failure()        # run this step even if previous step failed
        with:
          name: test-results-${{ matrix.JDK }}-${{ matrix.SCALA_VERSION }}
          path: '**/target/test-reports/*.xml'
